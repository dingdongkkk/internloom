# Postgres for local dev:  docker compose up -d
services:
  db:
    image: postgres:16
    container_name: internloom-db
    environment:
      POSTGRES_USER: internloom
      POSTGRES_PASSWORD: internloom
      POSTGRES_DB: internloom
    ports:
      - "5432:5432"
    volumes:
      - internloom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U internloom"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  internloom_pgdata:
