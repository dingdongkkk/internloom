<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>InternLoom — Talent Matching</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ design tokens (validated reference palette) ============ */
:root {
  color-scheme: light;
  --page:        #f9f9f7;
  --surface:     #fcfcfb;
  --ink:         #0b0b0b;
  --ink-2:       #52514e;
  --muted:       #898781;
  --hairline:    #e1e0d9;
  --ring:        rgba(11,11,11,0.10);
  /* sequential blue — magnitudes (match score, completeness) */
  --seq-100: #cde2fb; --seq-250: #86b6ef; --seq-450: #2a78d6; --seq-600: #184f95;
  /* status palette — reserved for state, never for series */
  --st-good: #0ca30c; --st-warn: #fab219; --st-serious: #ec835a; --st-crit: #d03b3b;
  --st-good-text: #006300;
}
* { box-sizing: border-box; }
body {
  margin: 0; background: var(--page); color: var(--ink);
  font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
}
/* ============ layout chrome ============ */
header {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px; background: var(--surface);
  border-bottom: 1px solid var(--hairline);
  position: sticky; top: 0; z-index: 10;
}
header h1 { font-size: 18px; margin: 0; letter-spacing: 0; }
header h1 span { color: var(--seq-450); }
.spacer { flex: 1; }
.who { color: var(--ink-2); font-size: 13px; }
main { max-width: 1080px; margin: 0 auto; padding: 24px 20px 80px; }
.card {
  background: var(--surface); border: 1px solid var(--ring);
  border-radius: 10px; padding: 18px 20px; margin-bottom: 16px;
}
.card h2 { margin: 0 0 4px; font-size: 16px; }
.card .sub { color: var(--muted); font-size: 13px; margin: 0 0 14px; }
/* ============ controls ============ */
input, select {
  font: inherit; color: inherit; background: var(--surface);
  border: 1px solid var(--hairline); border-radius: 7px; padding: 8px 10px;
}
input:focus, select:focus { outline: 2px solid var(--seq-250); border-color: var(--seq-450); }
button {
  font: inherit; font-weight: 600; cursor: pointer;
  border: 1px solid var(--hairline); border-radius: 7px;
  background: var(--surface); color: var(--ink); padding: 8px 14px;
}
button:hover { border-color: var(--seq-450); }
button.primary { background: var(--seq-450); border-color: var(--seq-450); color: #fff; }
button.primary:hover { background: var(--seq-600); }
button.ghost { border-color: transparent; color: var(--seq-450); background: transparent; }
button:disabled { opacity: .45; cursor: default; }
.row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
@media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }
label.f { display: flex; flex-direction: column; gap: 3px; font-size: 12.5px; color: var(--ink-2); }
label.f input, label.f select { width: 100%; }
/* ============ tabs ============ */
nav.tabs { display: flex; gap: 4px; margin: 4px 0 20px; border-bottom: 1px solid var(--hairline); }
nav.tabs button {
  border: none; background: none; font-weight: 600; color: var(--ink-2);
  padding: 9px 14px; border-radius: 0; border-bottom: 2px solid transparent;
}
nav.tabs button.on { color: var(--ink); border-bottom-color: var(--seq-450); }
nav.tabs .badge {
  background: var(--st-crit); color: #fff; border-radius: 99px;
  font-size: 11px; padding: 1px 7px; margin-left: 5px; font-weight: 700;
}
/* ============ tables ============ */
.tablewrap { overflow-x: auto; }
table { border-collapse: collapse; width: 100%; font-size: 14px; }
th { text-align: left; color: var(--muted); font-size: 12px; font-weight: 600;
     text-transform: uppercase; letter-spacing: .4px; }
th, td { padding: 9px 12px; border-bottom: 1px solid var(--hairline); }
tr:last-child td { border-bottom: none; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
/* ============ meters & score (sequential blue = magnitude) ============ */
.meter { height: 8px; background: var(--seq-100); border-radius: 4px; overflow: hidden; }
.meter > i { display: block; height: 100%; background: var(--seq-450); border-radius: 4px; }
.score {
  display: inline-flex; align-items: baseline; gap: 2px;
  font-weight: 700; font-variant-numeric: tabular-nums; color: var(--ink);
}
.score small { color: var(--muted); font-weight: 400; }
.scorebar { display: flex; align-items: center; gap: 10px; min-width: 130px; }
.scorebar .meter { flex: 1; }
/* breakdown mini-bars: one measure family -> one hue, labels carry identity */
.bd { display: grid; grid-template-columns: auto 1fr auto; gap: 3px 8px;
      font-size: 12px; color: var(--ink-2); margin-top: 10px; max-width: 340px; }
.bd .meter { height: 5px; align-self: center; }
.bd b { font-variant-numeric: tabular-nums; font-weight: 600; }
/* ============ status chips (icon + label, never color alone) ============ */
.chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px;
        font-weight: 600; padding: 2px 10px 2px 8px; border-radius: 99px;
        border: 1px solid var(--hairline); background: var(--surface); color: var(--ink-2); }
.chip::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
.chip.active::before, .chip.offer_extended::before { background: var(--st-good); }
.chip.active, .chip.offer_extended { color: var(--st-good-text); }
.chip.under_review::before, .chip.draft::before { background: var(--st-warn); }
.chip.shortlisted::before { background: var(--seq-450); }
.chip.rejected::before, .chip.closed::before { background: var(--st-crit); }
.chip.submitted::before { background: var(--seq-250); }
.chip.withdrawn::before { background: var(--muted); }
/* ============ listing cards ============ */
.listing { display: flex; gap: 16px; justify-content: space-between;
           padding: 14px 2px; border-bottom: 1px solid var(--hairline); }
.listing:last-child { border-bottom: none; }
.listing h3 { margin: 0 0 2px; font-size: 15px; }
.listing .meta { color: var(--muted); font-size: 13px; }
.listing .skills { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 5px; }
.sk { font-size: 12px; border: 1px solid var(--hairline); border-radius: 6px;
      padding: 1px 8px; color: var(--ink-2); background: var(--page); }
.listing .right { text-align: right; min-width: 170px; display: flex;
                  flex-direction: column; gap: 8px; align-items: flex-end; }
/* ============ auth screen ============ */
.auth { max-width: 430px; margin: 8vh auto 0; }
.auth .logo { text-align: center; font-size: 26px; font-weight: 700; margin-bottom: 18px; }
.auth .logo span { color: var(--seq-450); }
.seg { display: flex; border: 1px solid var(--hairline); border-radius: 8px;
       overflow: hidden; margin-bottom: 14px; }
.seg button { flex: 1; border: none; border-radius: 0; background: var(--page); }
.seg button.on { background: var(--seq-450); color: #fff; }
.hint { font-size: 12.5px; color: var(--muted); margin-top: 10px; line-height: 1.5; }
/* ============ toasts ============ */
#toasts { position: fixed; bottom: 18px; right: 18px; display: flex;
          flex-direction: column; gap: 8px; z-index: 50; max-width: 360px; }
.toast { background: var(--ink); color: #fff; border-radius: 8px; font-size: 13.5px;
         padding: 10px 14px; box-shadow: 0 4px 14px rgba(0,0,0,.18); }
.toast.err { background: var(--st-crit); }
.toast.ok { background: var(--st-good-text); }
.msg-empty { color: var(--muted); padding: 14px 0; }
.notif { display: flex; gap: 10px; padding: 10px 2px; border-bottom: 1px solid var(--hairline);
         font-size: 14px; align-items: flex-start; }
.notif:last-child { border-bottom: none; }
.notif.unread { font-weight: 600; }
.notif .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--seq-450);
              margin-top: 6px; flex: none; }
.notif.read .dot { background: var(--hairline); }
.notif time { color: var(--muted); font-size: 12px; font-weight: 400; }

/* ============ application refresh ============ */
:root {
  --page: #f8fafc;
  --surface: #ffffff;
  --surface-soft: #f1f5f9;
  --ink: #0f172a;
  --ink-2: #475569;
  --muted: #64748b;
  --hairline: #e2e8f0;
  --ring: rgba(23, 33, 43, .10);
  --seq-100: #ebf4ff;
  --seq-250: #9ac8f2;
  --seq-450: #0a66c2;
  --seq-600: #004182;
  --accent: #00a0a0;
  --accent-soft: #e0f7f7;
  --warm: #f5820d;
  --st-good: #16a34a;
  --st-good-text: #166534;
}
body { background: var(--page); color: var(--ink); font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
header {
  min-height: 68px; padding: 12px clamp(18px, 4vw, 48px);
  background: rgba(255,255,255,.96); box-shadow: 0 1px 0 var(--hairline);
}
header h1 { display: flex; align-items: center; gap: 9px; font-size: 18px; letter-spacing: 0; }
.brand-logo { width: 36px; height: 36px; object-fit: contain; background: #fff; border-radius: 5px; }
.brand-text { color: var(--ink); font-size: 17px; font-weight: 800; letter-spacing: .4px; }
.brand-text span { color: inherit; }
.who { display: inline-flex; align-items: center; gap: 8px; padding-left: 14px; border-left: 1px solid var(--hairline); }
.who::before { content: ""; width: 7px; height: 7px; border-radius: 50%; background: var(--st-good); }
main { max-width: 1180px; padding: 32px clamp(16px, 4vw, 48px) 84px; }
.app-shell { min-width: 0; }
.page-heading { display: flex; align-items: end; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
.page-heading h2 { margin: 0; font-size: 32px; letter-spacing: 0; }
.page-heading p { margin: 5px 0 0; color: var(--ink-2); max-width: 690px; }
.eyebrow { color: var(--accent); font-size: 11px; font-weight: 800; letter-spacing: 1.2px; text-transform: uppercase; }
.card { border: 1px solid var(--hairline); border-radius: 8px; box-shadow: 0 8px 26px rgba(25, 41, 54, .04); padding: 22px 24px; margin-bottom: 18px; }
.card h2 { font-size: 18px; letter-spacing: 0; }
.card .sub { line-height: 1.55; }
input, select { min-height: 42px; border-radius: 6px; border-color: #cfd9e1; background: #fff; }
textarea { font: inherit; color: inherit; border: 1px solid #cfd9e1; border-radius: 6px; padding: 9px 10px; resize: vertical; }
textarea:focus { outline: 2px solid var(--seq-250); border-color: var(--seq-450); }
button { min-height: 40px; border-radius: 6px; padding: 8px 15px; transition: border-color .16s, background .16s, transform .16s; }
button:hover { transform: translateY(-1px); }
button.primary { background: var(--seq-450); border-color: var(--seq-450); }
button.primary:hover { background: var(--seq-600); border-color: var(--seq-600); }
button.ghost { color: var(--seq-600); }
.tabs { gap: 6px !important; margin: 0 0 26px !important; border-bottom: 1px solid var(--hairline) !important; }
nav.tabs button { min-height: 43px; padding: 9px 5px 11px; margin-right: 18px; color: var(--ink-2); }
nav.tabs button.on { color: var(--ink); border-bottom-color: var(--accent); }
.badge { background: var(--accent) !important; }
.toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 18px 0 4px; }
.search { position: relative; flex: 1; max-width: 370px; }
.search input { width: 100%; padding-left: 38px; }
.search::before { content: "⌕"; position: absolute; left: 13px; top: 8px; color: var(--muted); font-size: 20px; z-index: 1; }
.result-count { color: var(--muted); font-size: 13px; white-space: nowrap; }
.listing { gap: 24px; padding: 20px 0; }
.listing h3 { font-size: 16px; letter-spacing: 0; }
.listing .meta { line-height: 1.7; }
.listing .right { min-width: 185px; }
.listing .right > .meter { width: 150px !important; }
.listing:hover { background: var(--surface-soft); margin: 0 -12px; padding-left: 12px; padding-right: 12px; }
.listing .skills { margin-top: 10px; }
.sk { border-radius: 4px; padding: 3px 8px; background: var(--surface-soft); }
.score { font-size: 20px; }
.score small { font-size: 11px; }
.match-score { display: flex; align-items: baseline; gap: 5px; color: var(--seq-600); }
.match-score span { font-size: 26px; font-weight: 800; line-height: 1; }
.match-score small { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
.bd { padding: 11px 12px; background: var(--surface-soft); border-radius: 6px; margin-top: 13px; }
.meter { background: var(--seq-100); }
.meter > i { background: var(--seq-450); }
.chip { border-radius: 5px; padding: 5px 9px 5px 8px; text-transform: capitalize; }
.chip::before { width: 7px; height: 7px; }
.stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 4px 0 18px; }
.stat { background: var(--surface-soft); border: 1px solid var(--hairline); border-radius: 6px; padding: 14px 16px; }
.stat strong { display: block; font-size: 23px; line-height: 1.15; }
.stat span { color: var(--muted); font-size: 12px; }
.form-section { padding-top: 17px; margin-top: 18px; border-top: 1px solid var(--hairline); }
.form-section h3 { margin: 0 0 12px; font-size: 14px; }
.auth { max-width: 960px; margin: 7vh auto 0; display: grid; grid-template-columns: minmax(0, 1fr) minmax(330px, 410px); gap: 56px; align-items: center; }
.auth .logo { display: flex; align-items: center; gap: 11px; text-align: left; font-size: 36px; letter-spacing: 0; margin-bottom: 20px; }
.auth .logo .brand-logo { width: 58px; height: 58px; border-radius: 8px; }
.auth .logo .brand-text { font-size: 28px; }
.auth-intro h2 { max-width: 470px; margin: 0; font-size: 46px; line-height: 1.04; letter-spacing: 0; }
.auth-intro p { max-width: 460px; color: var(--ink-2); font-size: 16px; margin: 18px 0 0; }
.auth .card { margin: 0; padding: 25px; }
.auth .seg { background: var(--surface-soft); }
.auth .seg button { min-height: 43px; background: transparent; }
.auth .seg button.on { background: var(--ink); }
.hint { background: var(--surface-soft); border-radius: 6px; padding: 11px 12px; }
table { font-size: 13.5px; }
th, td { padding: 12px; }
tbody tr:hover, tr:hover td { background: var(--surface-soft); }
.notif { padding: 14px 2px; }
#toasts { bottom: 24px; right: 24px; }
.toast { border-radius: 6px; }
@media (max-width: 760px) {
  .auth { grid-template-columns: 1fr; gap: 24px; margin-top: 28px; }
  .auth-intro h2 { font-size: 34px; }
  .page-heading h2 { font-size: 26px; }
  .auth-intro p { font-size: 14px; margin-top: 10px; }
  .auth .logo { font-size: 28px; margin-bottom: 12px; }
  .auth .card { padding: 20px; }
  .page-heading { display: block; }
  .page-heading p { margin-top: 8px; }
  .toolbar { align-items: stretch; flex-direction: column; }
  .search { max-width: none; }
  .result-count { align-self: flex-end; }
  .listing { display: block; }
  .listing .right { margin-top: 16px; align-items: stretch; text-align: left; }
  .listing .right > .meter { width: 100% !important; }
  .listing .right .row { justify-content: flex-start; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  header { padding: 10px 16px; }
  header .who { max-width: 42vw; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  main { padding-top: 22px; }
  nav.tabs { overflow-x: auto; scrollbar-width: none; }
  nav.tabs button { flex: 0 0 auto; margin-right: 10px; }
  #toasts { left: 16px; right: 16px; bottom: 16px; max-width: none; }
}
@media (max-width: 420px) {
  .card { padding: 18px 16px; }
  .stat-grid { grid-template-columns: 1fr; }
  .row { align-items: stretch; }
  .row button { flex: 1; }
}
</style>
</head>
<body>

<header id="topbar" hidden>
  <h1><img class="brand-logo" src="assets/internloom-logo.png" alt="" onerror="this.style.display='none'"><span class="brand-text">INTERN<span>LOOM</span></span></h1>
  <span class="who" id="whoami"></span>
  <div class="spacer"></div>
  <button class="ghost" onclick="logout()">Log out</button>
</header>

<main id="app"></main>
<div id="toasts"></div>

<script>
"use strict";
/* ================= state & api ================= */
const API = localStorage.getItem("il_api") || "http://localhost:8000";
let S = { token: null, role: null, email: null, profile: null, unread: 0, matchings: [] };

async function api(method, path, body, silent) {
  const opts = { method, headers: {} };
  if (S.token) opts.headers.Authorization = "Bearer " + S.token;
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  let res, j;
  try { res = await fetch(API + path, opts); j = await res.json(); }
  catch (e) { toast("API unreachable at " + API + " — is the server running?", "err"); throw e; }
  if (!j.success && !silent) toast(`${j.error.code}: ${j.error.message}`, "err");
  return j;
}
function toast(text, kind) {
  const t = document.createElement("div");
  t.className = "toast " + (kind || "");
  t.textContent = text;
  document.getElementById("toasts").appendChild(t);
  setTimeout(() => t.remove(), 4200);
}
const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
const chip = s => `<span class="chip ${esc(s)}">${esc(s).replace(/_/g, " ")}</span>`;
const meter = (pct, w) =>
  `<div class="meter" style="${w ? "width:" + w : ""}"><i style="width:${Math.max(0, Math.min(100, pct))}%"></i></div>`;

/* ================= auth screen ================= */
let authRole = "student", pendingUser = null;

function renderAuth() {
  document.getElementById("topbar").hidden = true;
  document.getElementById("app").innerHTML = `
  <div class="auth">
    <section class="auth-intro">
      <div class="logo"><img class="brand-logo" src="assets/internloom-logo.png" alt="InternLoom logo" onerror="this.style.display='none'"><span class="brand-text">INTERN<span>LOOM</span></span></div>
      <h2>Find the internship that fits your next chapter.</h2>
      <p>A focused workspace for students to discover better-fit roles and for companies to move promising applicants forward.</p>
    </section>
    <section class="card">
      <div class="eyebrow">${authRole === "student" ? "Student workspace" : "Company workspace"}</div>
      <h2 style="margin:7px 0 17px">Welcome back</h2>
      <div class="seg">
        <button class="${authRole === "student" ? "on" : ""}" onclick="authRole='student';renderAuth()">Student</button>
        <button class="${authRole === "company" ? "on" : ""}" onclick="authRole='company';renderAuth()">Company</button>
      </div>
      <div class="grid2" style="grid-template-columns:1fr">
        ${authRole === "company" ? `<label class="f">Company name<input id="aName" placeholder="Acme Corp"></label>` : ""}
        <label class="f">${authRole === "student" ? "College email" : "Corporate email"}
          <input id="aEmail" type="email" autocomplete="email" placeholder="${authRole === "student" ? "you@bmsce.ac.in" : "hr@company.com"}"></label>
        <label class="f">Password<input id="aPass" type="password" autocomplete="new-password" placeholder="8+ characters"></label>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="primary" onclick="doLogin()">Log in</button>
        <button onclick="doSignup()">Create account</button>
      </div>
      <div id="otpZone"></div>
      <p class="hint">Seeded demo logins (password <b>Password123</b>):<br>
        student — priya@bmsce.ac.in &nbsp;·&nbsp; company — hr@technova.com</p>
    </section>
  </div>`;
}

async function doSignup() {
  const email = val("aEmail"), password = val("aPass");
  if (!email || !password) {
    toast("Enter an email and password before creating an account.", "err");
    return;
  }
  if (password.length < 8) {
    toast("Password must be at least 8 characters.", "err");
    return;
  }
  if (authRole === "company" && !val("aName")) {
    toast("Enter your company name before creating an account.", "err");
    return;
  }
  const r = authRole === "student"
    ? await api("POST", "/auth/register/student", { email, password })
    : await api("POST", "/auth/register/company", { email, password, company_name: val("aName") });
  if (!r.success) return;
  if (authRole === "company") { toast("Company created — log in. (Listings need admin approval to go live.)", "ok"); return; }
  pendingUser = r.data.user_id;
  document.getElementById("otpZone").innerHTML = `
    <div class="row" style="margin-top:12px">
      <label class="f">OTP (demo: returned by the API)
        <input id="aOtp" value="${esc(r.data.otp_for_demo)}" size="8"></label>
      <button class="primary" style="align-self:flex-end" onclick="doVerify()">Verify email</button>
    </div>`;
  toast("Registered. Verify the OTP to unlock applying.", "ok");
}
async function doVerify() {
  const r = await api("POST", "/auth/verify-otp", { user_id: pendingUser, code: val("aOtp") });
  if (r.success) { toast("Email verified ✓", "ok"); doLogin(); }
}
async function doLogin() {
  const r = await api("POST", "/auth/login", { email: val("aEmail"), password: val("aPass") });
  if (!r.success) return;
  S.token = r.data.access_token; S.role = r.data.role; S.email = val("aEmail");
  enterApp();
}
function logout() { S = { token: null, role: null, matchings: [] }; matchQuery = ""; renderAuth(); }
const val = id => document.getElementById(id).value.trim();

/* ================= shell ================= */
let tab = null, matchQuery = "";
async function enterApp() {
  document.getElementById("topbar").hidden = false;
  document.getElementById("whoami").textContent = `${S.email} · ${S.role}`;
  tab = S.role === "student" ? "matches" : "listings";
  await refreshUnread();
  render();
}
async function refreshUnread() {
  const r = await api("GET", "/notifications?is_read=false&page_size=1", undefined, true);
  S.unread = r.success ? r.meta.total : 0;
}
function tabsFor(role) {
  return role === "student"
    ? [["matches", "Matched roles"], ["profile", "My profile"], ["apps", "My applications"], ["notifs", "Notifications"]]
    : [["listings", "My listings"], ["post", "Post a role"], ["notifs", "Notifications"]];
}
async function render() {
  const meta = {
    matches: ["Discover roles", "Your strongest matches, ranked by fit."],
    profile: ["My profile", "Keep your details current so every match gets sharper."],
    apps: ["My applications", "Track every application from submission to offer."],
    notifs: ["Notifications", "Updates from your applications and listings."],
    listings: ["My listings", "Manage roles, applicant caps, and hiring progress."],
    post: ["Post a role", "Create a focused opportunity for the right candidates."]
  }[tab];
  const t = tabsFor(S.role).map(([id, label]) =>
    `<button class="${tab === id ? "on" : ""}" onclick="tab='${id}';render()">${label}
     ${id === "notifs" && S.unread ? `<span class="badge">${S.unread}</span>` : ""}</button>`).join("");
  document.getElementById("app").innerHTML =
    `<div class="app-shell">
      <div class="page-heading"><div><div class="eyebrow">${S.role === "student" ? "Student" : "Company"} dashboard</div><h2>${meta[0]}</h2><p>${meta[1]}</p></div></div>
      <nav class="tabs">${t}</nav><div id="panel"></div>
    </div>`;
  await ({ matches, profile, apps, notifs, listings, post }[tab])();
}

/* ================= student: matched roles ================= */
async function matches() {
  panel(`<div class="card"><div class="row" style="justify-content:space-between;align-items:flex-end">
    <div><h2>Recommended for you</h2>
    <p class="sub">Each role is ranked using your skills, branch, graduation year, profile completeness, and listing recency.</p></div>
    <span class="chip active">Live roles</span></div>
    <div class="toolbar"><label class="search"><input id="matchSearch" oninput="filterMatches(this.value)" placeholder="Search title, location, or skill" aria-label="Search matched roles"></label><span class="result-count" id="matchCount">Loading…</span></div>
    <div id="list">Loading…</div></div>`);
  const r = await api("GET", "/listings?page_size=50");
  if (!r.success) return;
  S.matchings = r.data;
  renderMatchRows();
}
function filterMatches(query) { matchQuery = query.trim().toLowerCase(); renderMatchRows(); }
function renderMatchRows() {
  const el = document.getElementById("list"), count = document.getElementById("matchCount");
  if (!el || !count) return;
  const roles = S.matchings.filter(l => {
    const haystack = [l.title, l.location, ...(l.required_skills || []), ...(l.preferred_skills || [])].join(" ").toLowerCase();
    return !matchQuery || haystack.includes(matchQuery);
  });
  count.textContent = `${roles.length} role${roles.length === 1 ? "" : "s"}`;
  if (!roles.length) return el.innerHTML = `<div class="msg-empty">No roles match that search.</div>`;
  el.innerHTML = roles.map(l => `
    <div class="listing">
      <div>
        <h3>${esc(l.title)}</h3>
        <div class="meta">${esc(l.location)} · ${l.stipend ? "₹" + l.stipend + "/mo" : "stipend n/a"}
          ${l.deadline ? " · closes " + new Date(l.deadline).toLocaleDateString() : ""}
          ${l.target_branch ? " · " + esc(l.target_branch) : ""}
          ${l.target_graduation_year ? " · " + esc(l.target_graduation_year) : ""}</div>
        <div class="skills">${(l.required_skills || []).slice(0, 5).map(s => `<span class="sk">${esc(s)}</span>`).join("")}</div>
        <div class="bd">
          <span>required skills</span> ${meter(l.breakdown.required_skills * 100)} <b>${Math.round(l.breakdown.required_skills * 100)}%</b>
          <span>preferred skills</span> ${meter(l.breakdown.preferred_skills * 100)} <b>${Math.round(l.breakdown.preferred_skills * 100)}%</b>
          <span>branch / year fit</span> ${meter(l.breakdown.branch_year * 100)} <b>${Math.round(l.breakdown.branch_year * 100)}%</b>
          <span>profile complete</span> ${meter(l.breakdown.completeness * 100)} <b>${Math.round(l.breakdown.completeness * 100)}%</b>
          <span>listing recency</span> ${meter(l.breakdown.recency * 100)} <b>${Math.round(l.breakdown.recency * 100)}%</b>
        </div>
      </div>
      <div class="right">
        <div class="match-score" title="match score"><span>${l.score}</span><small>match</small></div>
        ${meter(l.score, "130px")}
        ${l.accepting_applications
          ? `<button class="primary" onclick="apply(${l.id})">Apply</button>`
          : chip("closed")}
      </div>
    </div>`).join("");
}
async function apply(id) {
  const r = await api("POST", `/listings/${id}/apply`);
  if (r.success) { toast(`Applied — score ${r.data.match_score} locked in ✓`, "ok"); matches(); }
}

/* ================= student: profile ================= */
async function profile() {
  const r = await api("GET", "/profile/me");
  if (!r.success) return;
  const p = r.data;
  panel(`<div class="card">
    <h2>My profile</h2>
    <p class="sub">Completeness is computed on every fetch — it feeds directly into your match scores.</p>
    <div class="row" style="margin-bottom:14px">
      <div class="scorebar" style="flex:1;max-width:420px">${meter(p.completeness)} </div>
      <span class="score">${p.completeness}<small>%</small></span>
    </div>
    <div class="grid2">
      <label class="f">Name<input id="pName" value="${esc(p.name)}"></label>
      <label class="f">College<input id="pCollege" value="${esc(p.college)}"></label>
      <label class="f">Branch<input id="pBranch" value="${esc(p.branch)}" placeholder="CSE"></label>
      <label class="f">Graduation year<input id="pYear" value="${esc(p.graduation_year)}" placeholder="2026"></label>
      <label class="f">CGPA<input id="pCgpa" value="${esc(p.cgpa)}" placeholder="8.5"></label>
      <label class="f">GitHub URL<input id="pGithub" value="${esc(p.github_url)}"></label>
      <label class="f">LinkedIn URL<input id="pLinkedin" value="${esc(p.linkedin_url)}"></label>
      <label class="f">Resume URL<input id="pResume" value="${esc(p.resume_url)}"></label>
    </div>
    <label class="f" style="margin-top:8px">Bio<input id="pBio" value="${esc(p.bio)}"></label>
    <label class="f" style="margin-top:8px">Skills (comma separated — stored normalized, not as text)
      <input id="pSkills" value="${esc((p.skills || []).join(", "))}"></label>
    <div class="row" style="margin-top:14px"><button id="saveProfileBtn" class="primary" onclick="saveProfile()">Save profile</button></div>
  </div>`);
}
async function saveProfile() {
  const saveButton = document.getElementById("saveProfileBtn");
  if (!saveButton || saveButton.disabled) return;
  saveButton.disabled = true;
  saveButton.textContent = "Saving…";
  const body = {
    name: val("pName") || null, college: val("pCollege") || null, branch: val("pBranch") || null,
    graduation_year: val("pYear") ? +val("pYear") : null,
    cgpa: val("pCgpa") ? +val("pCgpa") : null,
    github_url: val("pGithub") || null, linkedin_url: val("pLinkedin") || null,
    resume_url: val("pResume") || null, bio: val("pBio") || null,
    skills: val("pSkills").split(",").map(s => s.trim()).filter(Boolean),
  };
  try {
    const r = await api("PUT", "/profile/me", body);
    if (r.success) {
      // Fetch the committed record before showing success. This prevents the
      // UI from claiming a save while displaying stale form state.
      await profile();
      toast(`Saved — completeness ${r.data.completeness}%`, "ok");
    }
  } finally {
    const currentButton = document.getElementById("saveProfileBtn");
    if (currentButton) {
      currentButton.disabled = false;
      currentButton.textContent = "Save profile";
    }
  }
}

/* ================= student: my applications ================= */
async function apps() {
  panel(`<div class="card"><h2>My applications</h2>
    <p class="sub">Score shown is the snapshot frozen when you applied.</p>
    <div class="stat-grid" id="appStats"></div><div id="list">Loading…</div></div>`);
  const r = await api("GET", "/applications/mine");
  if (!r.success) return;
  const el = document.getElementById("list");
  if (!r.data.length) return el.innerHTML = `<div class="msg-empty">No applications yet — find a match first.</div>`;
  const counts = status => r.data.filter(a => a.status === status).length;
  document.getElementById("appStats").innerHTML = `
    <div class="stat"><strong>${r.data.length}</strong><span>Total applications</span></div>
    <div class="stat"><strong>${counts("under_review") + counts("shortlisted")}</strong><span>In progress</span></div>
    <div class="stat"><strong>${counts("offer_extended")}</strong><span>Offers</span></div>`;
  el.innerHTML = `<div class="tablewrap"><table>
    <tr><th>Role</th><th>Status</th><th class="num">Match</th><th>Applied</th><th></th></tr>
    ${r.data.map(a => `<tr>
      <td>${esc(a.listing_title)}</td>
      <td>${chip(a.status)}</td>
      <td class="num">${a.match_score ?? "—"}</td>
      <td>${new Date(a.applied_at).toLocaleDateString()}</td>
      <td>${a.can_withdraw ? `<button onclick="withdraw(${a.application_id})">Withdraw</button>` : ""}</td>
    </tr>`).join("")}</table></div>`;
}
async function withdraw(id) {
  const r = await api("POST", `/applications/${id}/withdraw`);
  if (r.success) { toast("Application withdrawn", "ok"); apps(); }
}

/* ================= notifications (both roles) ================= */
async function notifs() {
  panel(`<div class="card"><div class="row" style="justify-content:space-between">
      <h2>Notifications</h2>
      <button onclick="markAll()">Mark all read</button></div>
    <div id="list">Loading…</div></div>`);
  const r = await api("GET", "/notifications?page_size=50");
  if (!r.success) return;
  const el = document.getElementById("list");
  if (!r.data.length) return el.innerHTML = `<div class="msg-empty">Nothing yet.</div>`;
  el.innerHTML = r.data.map(n => `
    <div class="notif ${n.is_read ? "read" : "unread"}">
      <span class="dot"></span>
      <div>${esc(n.message)}<br><time>${new Date(n.created_at).toLocaleString()}</time></div>
      ${n.is_read ? "" : `<div class="spacer"></div><button class="ghost" onclick="markOne(${n.id})">read</button>`}
    </div>`).join("");
}
async function markOne(id) { await api("PATCH", "/notifications/read", { ids: [id] }); await refreshUnread(); render(); }
async function markAll() { await api("PATCH", "/notifications/read", { all: true }); await refreshUnread(); render(); }

/* ================= company: my listings ================= */
async function listings() {
  panel(`<div class="card"><h2>My listings</h2>
    <p class="sub">draft → active → closed. Cap-closed listings reopen automatically if a withdrawal frees a slot.</p>
    <div class="stat-grid" id="listingStats"></div>
    <div id="list">Loading…</div></div>
    <div class="card" id="applicantsCard" hidden><h2 id="applicantsTitle"></h2>
    <p class="sub">Sorted by match score frozen at apply time.</p><div id="applicants"></div></div>`);
  const r = await api("GET", "/listings/mine");
  if (!r.success) return;
  const el = document.getElementById("list");
  if (!r.data.length) return el.innerHTML = `<div class="msg-empty">No listings yet — post your first role.</div>`;
  const countStatus = status => r.data.filter(l => l.status === status).length;
  document.getElementById("listingStats").innerHTML = `
    <div class="stat"><strong>${r.data.length}</strong><span>Total roles</span></div>
    <div class="stat"><strong>${countStatus("active")}</strong><span>Live roles</span></div>
    <div class="stat"><strong>${r.data.reduce((n, l) => n + (l.applicant_count || 0), 0)}</strong><span>Total applicants</span></div>`;
  el.innerHTML = r.data.map(l => `
    <div class="listing">
      <div>
        <h3>${esc(l.title)}</h3>
        <div class="meta">${esc(l.location)} · cap ${l.applicant_count}/${l.max_applicants}
          ${l.target_branch ? " · " + esc(l.target_branch) : ""}
          ${l.target_graduation_year ? " · " + esc(l.target_graduation_year) : ""}
          ${l.closed_reason ? " · closed: " + esc(l.closed_reason) : ""}</div>
        <div class="skills">${(l.required_skills || []).map(s => `<span class="sk">${esc(s)}</span>`).join("")}
          ${(l.preferred_skills || []).map(s => `<span class="sk" style="opacity:.6">${esc(s)}+</span>`).join("")}</div>
      </div>
      <div class="right">
        ${chip(l.status)}
        <div class="row">
          ${l.status === "draft" ? `<button class="primary" onclick="setStatus(${l.id},'active')">Activate</button>` : ""}
          ${l.status === "active" ? `<button onclick="setStatus(${l.id},'closed')">Close</button>` : ""}
          <button class="ghost" onclick="viewApplicants(${l.id}, decodeURIComponent('${encodeURIComponent(l.title)}'))">Applicants</button>
        </div>
      </div>
    </div>`).join("");
}
async function setStatus(id, status) {
  const r = await api("PATCH", `/listings/${id}/status`, { status });
  if (r.success) { toast(`Listing #${id} → ${status}`, "ok"); listings(); }
}
async function viewApplicants(id, title) {
  const card = document.getElementById("applicantsCard");
  card.hidden = false;
  document.getElementById("applicantsTitle").textContent = "Applicants — " + title;
  const r = await api("GET", `/listings/${id}/applicants?page_size=50`);
  if (!r.success) return;
  const el = document.getElementById("applicants");
  if (!r.data.length) return el.innerHTML = `<div class="msg-empty">No applicants yet.</div>`;
  el.innerHTML = `<div class="tablewrap"><table>
    <tr><th>App</th><th>Student</th><th class="num">Match</th><th>Status</th><th>Actions</th></tr>
    ${r.data.map(a => `<tr>
      <td class="num">#${a.application_id}</td>
      <td>student ${a.student_id}</td>
      <td class="num">${a.match_score ?? "—"}</td>
      <td>${chip(a.status)}</td>
      <td class="row">
        ${a.status === "submitted" ? actBtn(a, "under_review", "Review") : ""}
        ${a.status === "under_review" ? actBtn(a, "shortlisted", "Shortlist") : ""}
        ${a.status === "shortlisted" ? actBtn(a, "offer_extended", "Extend offer") : ""}
        ${["submitted", "under_review", "shortlisted"].includes(a.status) ? actBtn(a, "rejected", "Reject") : ""}
      </td></tr>`).join("")}</table></div>`;
  card.dataset.listing = id; card.dataset.title = title;
}
const actBtn = (a, to, label) =>
  `<button ${to === "rejected" ? "" : 'class="primary"'} onclick="advance(${a.application_id},'${to}')">${label}</button>`;
async function advance(appId, status) {
  const r = await api("PATCH", `/applications/${appId}/status`, { status });
  if (r.success) {
    toast(`Application #${appId} → ${status.replace(/_/g, " ")}`, "ok");
    const card = document.getElementById("applicantsCard");
    viewApplicants(+card.dataset.listing, card.dataset.title);
  }
}

/* ================= company: post a role ================= */
function post() {
  panel(`<div class="card"><h2>Post a role</h2>
    <p class="sub">Created as a draft — activate it from “My listings”. On activation, students matching above 70 are notified.</p>
    <div class="grid2">
      <label class="f">Title<input id="lTitle" placeholder="Backend Intern"></label>
      <label class="f">Stipend (₹/month)<input id="lStipend" type="number" min="0" step="0.01" placeholder="20000"></label>
      <label class="f">Required skills (comma sep)<input id="lReq" placeholder="Python, FastAPI"></label>
      <label class="f">Preferred skills (comma sep)<input id="lPref" placeholder="Docker"></label>
      <label class="f">Target branch<input id="lBranch" placeholder="CSE"></label>
      <label class="f">Target graduation year<input id="lYear" type="number" min="2000" max="2100" placeholder="2026"></label>
      <label class="f">Location<select id="lLoc"><option>remote</option><option>hybrid</option><option>onsite</option></select></label>
      <label class="f">Max applicants<input id="lCap" type="number" min="1" step="1" placeholder="10"></label>
      <label class="f">Deadline (DD-MM-YYYY)<input id="lDeadline" type="text" inputmode="numeric" placeholder="31-12-2026" maxlength="10"></label>
    </div>
    <label class="f" style="margin-top:8px">Description<textarea id="lDesc" rows="3" placeholder="What will the intern do?"></textarea></label>
    <div class="row" style="margin-top:14px"><button class="primary" onclick="createListing()">Create draft</button></div>
  </div>`);
}
function parseDeadline(value) {
  const match = value.trim().match(/^(\d{2})[-\/](0[1-9]|1[0-2])[-\/](\d{4})$/);
  if (!match) return null;
  const day = Number(match[1]), month = Number(match[2]), year = Number(match[3]);
  const date = new Date(Date.UTC(year, month - 1, day, 23, 59, 59));
  if (date.getUTCFullYear() !== year || date.getUTCMonth() !== month - 1 || date.getUTCDate() !== day) return null;
  return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}T23:59:59Z`;
}
async function createListing() {
  const title = val("lTitle");
  const cap = val("lCap") ? +val("lCap") : NaN;
  const deadline = val("lDeadline");
  const deadlineIso = deadline ? parseDeadline(deadline) : null;
  if (!title) { toast("Enter a job title before creating the listing.", "err"); return; }
  if (!Number.isInteger(cap) || cap < 1) {
    toast("Max applicants must be a whole number greater than 0.", "err");
    return;
  }
  if (deadline && !deadlineIso) {
    toast("Use a valid deadline in DD-MM-YYYY format, for example 31-12-2026.", "err");
    return;
  }
  if (deadlineIso && new Date(deadlineIso) < new Date()) {
    toast("Deadline must be today or a future date.", "err");
    return;
  }
  const body = {
    title, description: val("lDesc") || null,
    required_skills: val("lReq").split(",").map(s => s.trim()).filter(Boolean),
    preferred_skills: val("lPref").split(",").map(s => s.trim()).filter(Boolean),
    stipend: val("lStipend") ? +val("lStipend") : null,
    target_branch: val("lBranch") || null,
    target_graduation_year: val("lYear") ? +val("lYear") : null,
    location: val("lLoc"),
    deadline: deadlineIso,
    max_applicants: cap,
  };
  const r = await api("POST", "/listings", body);
  if (r.success) {
    toast(`Draft #${r.data.id} created`, "ok");
    tab = "listings";
    await render();
  }
}

const panel = html => document.getElementById("panel").innerHTML = html;
renderAuth();
